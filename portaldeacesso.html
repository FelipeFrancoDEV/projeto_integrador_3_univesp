<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>AlfraMed | Portal</title>
    <link rel="stylesheet" href="temadoportaldeacesso.css?v=20260403">
    <link rel="shortcut icon" type="image/png" href="/Imagens/favicon_32.png?v=2">
    <link rel="icon" type="image/png" sizes="48x48" href="/Imagens/favicon_48.png?v=2">
    <link rel="icon" type="image/png" sizes="32x32" href="/Imagens/favicon_32.png?v=2">
    <link rel="icon" type="image/png" sizes="16x16" href="/Imagens/favicon_16.png?v=2">
    <link rel="apple-touch-icon" sizes="180x180" href="/Imagens/apple-touch-icon.png?v=2">
    <meta name="theme-color" content="#007B9A">
</head>
<body class="auth-body">
  <div class="auth-card">
    <img src="Imagens/logo_alframed_red.png" alt="Logo AlfraMed" class="logo-img" style="margin-bottom: 0;">
    <br>
    <div id="escolha-inicial" style="width: 100%;">
        <h3 style="text-align: center; margin-top: 0; margin-bottom: 20px;">Como deseja acessar?</h3>
        
        <button onclick="configurarLogin('medico')" class="auth-btn" style="margin-bottom: 10px;">Sou Médico</button>
        <button onclick="configurarLogin('paciente')" class="auth-btn" style="background: transparent; border: 2px solid #007B9A; color: #007B9A;">Sou Paciente</button>
    </div>

    <div id="form-login" style="display: none; width: 100%;">
        <h3 id="titulo-login" style="text-align: center; margin-top: 0; margin-bottom: 20px;">Login</h3>
        
        <form onsubmit="event.preventDefault(); fazerLoginNovo();">
            <input type="email" id="email" class="auth-input" placeholder="Seu e-mail (teste@teste)" required>
            <input type="password" id="senha" class="auth-input" placeholder="Sua senha (123)" required>
            
            <button type="submit" class="auth-btn">Entrar</button>
        </form>

        <p style="text-align: center; margin-top: 15px; font-size: 13px; color: #718096;">
            Não tem conta? <a href="cadastro.html" style="color: #0047AB; text-decoration: none; font-weight: bold;">Cadastre-se aqui</a>
        </p>
        
        <button class="btn-voltar-sistema" onclick="location.reload()" style="margin-top: 10px;">
            ← Voltar
        </button>
    </div>
</div>
    <script src="script.js"></script>
</body>
</html>
