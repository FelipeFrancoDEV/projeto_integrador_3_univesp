
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>AlfraMed | Área de Agendamento</title>
    <link rel="stylesheet" href="temadoportaldeacesso.css?v=20260403">
    <link rel="shortcut icon" type="image/png" href="/Imagens/favicon_32.png?v=2">
    <link rel="icon" type="image/png" sizes="48x48" href="/Imagens/favicon_48.png?v=2">
    <link rel="icon" type="image/png" sizes="32x32" href="/Imagens/favicon_32.png?v=2">
    <link rel="icon" type="image/png" sizes="16x16" href="/Imagens/favicon_16.png?v=2">
    <link rel="apple-touch-icon" sizes="180x180" href="/Imagens/apple-touch-icon.png?v=2">
    <meta name="theme-color" content="#007B9A">
    <style>
       
        .grade-horarios { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 12px; 
            margin-top: 20px; 
        }
        .horario-item { 
            padding: 12px; border: 1px solid #e0e6ed; border-radius: 8px; 
            text-align: center; cursor: pointer; font-size: 14px; font-weight: 600;
            color: #4a5568; transition: all 0.2s ease;
        }
        .horario-item:hover:not(.ocupado) { background: #f0f7ff; border-color: #0047AB; color: #0047AB; }
        .horario-item.ocupado { background: #f8fafc; color: #cbd5e0; cursor: not-allowed; text-decoration: line-through; }
    </style>
</head>
<body class="auth-body">

    <div class="auth-card" id="card-agendamento">
        
        <div class="logo-container">
            <img src="Imagens/logo_alframed_red.png" alt="Logo AlfraMed" class="logo-img">
        </div>

        <div class="conteudo-sistema">
            
            <div id="passo-login">
                <h2 class="titulo-sistema">Área de Agendamento</h2>
                <p class="subtitulo-sistema">Acesse para gerenciar suas consultas</p>
                
                <input type="email" class="auth-input" placeholder="Seu e-mail">
                <input type="password" class="auth-input" placeholder="Sua senha">
                <button class="auth-btn" onclick="liberarAgenda()">Entrar e Ver Horários</button>
                
                <p style="text-align: center; margin-top: 25px; font-size: 13px; color: #718096;">
                    Não tem cadastro? <a href="cadastro.html" style="color: #0047AB; font-weight: bold; text-decoration: none;">Faça agora</a>
                </p>
            </div>

            <div id="passo-agenda" style="display: none;">
                <h2 class="titulo-sistema">Horários Disponíveis</h2>
                <p class="subtitulo-sistema">Olá, selecione o melhor momento para sua consulta:</p>
                
                <div class="grade-horarios">
                    <div class="horario-item">08:00</div>
                    <div class="horario-item ocupado">09:00</div> 
                    <div class="horario-item">10:00</div>
                    <div class="horario-item">14:00</div>
                    <div class="horario-item">15:00</div>
                    <div class="horario-item ocupado">16:00</div>
                </div>

                <button class="auth-btn" style="margin-top: 30px;" onclick="confirmar()">Confirmar Agendamento</button>
            </div>
        </div>

        <button onclick="window.location.href='index.html'" class="btn-voltar-sistema">
         ⬅ Voltar
        </button>
    </div>

    <script>
        function liberarAgenda() {
            // Transição suave
            document.getElementById('passo-login').style.display = 'none';
            document.getElementById('passo-agenda').style.display = 'block';
            
            // IMPORTANTE: Removi a linha que alterava a largura para 500px.
            // O card deve manter sua estética vertical esticada.
        }
        function confirmar() {
            alert('Agendamento solicitado com sucesso!');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
