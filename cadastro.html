
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>IntegraMed | Cadastro</title>
    <link rel="stylesheet" href="temadoportaldeacesso.css">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/2869/2869833.png">
</head>
<body class="auth-body">
    <div class="auth-card">
        <h3 style="text-align: center; margin-bottom: 20px;">Criar Nova Conta</h3>
        <input type="text" class="auth-input" placeholder="Nome Completo">
        <input type="email" class="auth-input" placeholder="E-mail">
        <input type="password" class="auth-input" placeholder="Senha">
        
        <label style="font-size: 12px; color: #718096;">Tipo de conta:</label>
        <select class="auth-input">
            <option>Paciente</option>
            <option>Médico (Requer CRM)</option>
        </select>

        <button class="auth-btn" onclick="alert('Cadastro realizado! Use teste@teste e 123 para entrar.')">Cadastrar</button>
        <a href="portaldeacesso.html" style="display: block; text-align: center; margin-top: 15px; font-size: 13px; color: #718096; text-decoration: none;">Já tenho conta</a>
    </div>
</body>
</html>
